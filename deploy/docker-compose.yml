services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: gateway
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    image: ${MIGRATE_IMAGE:-ai-proxy-migrate:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: gateway
      PGPASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      PGDATABASE: gateway
    restart: "no"

  app:
    image: ${APP_IMAGE:-ai-proxy:latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Consumed via $env refs in infra-config.json (baked into the image at build).
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PORT: 8080
      # Optional: route Anthropic-bound traffic through an allowed-region proxy
      # when the host IP is geo-blocked (403 "Request not allowed").
      UPSTREAM_PROXY: ${UPSTREAM_PROXY:-}
    ports:
      - "${APP_PORT:-8080}:8080"

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: ${FRONTEND_IMAGE:-ai-proxy-frontend:latest}
    restart: unless-stopped
    depends_on:
      - app
    environment:
      # Backend base URL the BROWSER will call. Must be reachable from the
      # user's browser (host/public address), NOT the compose service name
      # `app` — that only resolves inside the docker network. Injected at
      # runtime into the page, so changing it needs no image rebuild.
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
